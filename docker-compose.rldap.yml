services:
  httpd-proxy:
    container_name: httpd-proxy
    build: ./httpd-proxy/
    networks:
      - front
      - back
    ports:
      - "80:80"
      - "443:443"

  idp:
    container_name: idp
    build: ./idp/
    depends_on:
      - ldap
    environment:
      - JETTY_MAX_HEAP=64m
      - JETTY_BROWSER_SSL_KEYSTORE_PASSWORD=password
      - JETTY_BACKCHANNEL_SSL_KEYSTORE_PASSWORD=password
    expose:
      - "4443"
    networks:
      - back
    secrets:
      - source: idp_backchannel
      - source: idp_browser
      - source: idp_encryption
      - source: idp_signing
      - source: idp_sealer

  ldap:
    container_name: ldap
    build: ./ldap/
    networks:
      - back

  gh-saml-sp-shibboleth:
    build:
      context: ./gh-saml-sp-shibboleth/
      dockerfile: Dockerfile
    image: gh/saml-sp-shibboleth:latest
    profiles:
      - builder # Evita que se levante al hacer 'up'

  gh-saml-sp-simplesamlphp:
    build:
      context: ./gh-saml-sp-simplesamlphp/
      dockerfile: Dockerfile
    image: gh/saml-sp-simplesamlphp:latest
    profiles:
      - builder # Evita que se levante al hacer 'up'

  sp:
    container_name: sp
    build:
      context: ./gh-sp-shibboleth/
      dockerfile: Dockerfile
    networks:
      - back
    secrets:
      - source: sp_key

  simplesamlphp:
    container_name: simplesamlphp
    build:
      context: ./gh-sp-simplesamlphp/
      dockerfile: Dockerfile
    links:
      - httpd-proxy:idptestbed.localhost
    networks:
      - back
    secrets:
      - source: ssp_key

  php-cas:
    container_name: php-cas
    build: ./php-cas/
    links:
      - httpd-proxy:idptestbed.localhost
    networks:
      - back

networks:
  front:
    driver: bridge
  back:
    driver: bridge

secrets:
  idp_backchannel:
    file: ./secrets/idp/idp-backchannel.p12
  idp_browser:
    file: ./secrets/idp/idp-browser.p12
  idp_encryption:
    file: ./secrets/idp/idp-encryption.key
  idp_signing:
    file: ./secrets/idp/idp-signing.key
  idp_sealer:
    file: ./secrets/idp/sealer.jks
  ssp_key:
    file: ./secrets/simplesamlphp/server.pem
  sp_key:
    file: ./secrets/sp/sp-key.pem
