ServerName idptestbed.localhost

<VirtualHost *:80>
    ServerName https://idptestbed.localhost:443
    UseCanonicalName On

    DocumentRoot "/var/www/html"
    DirectoryIndex index.php index.html
    <Location /php-shib-protected>
        AuthType shibboleth

        # Carga la sesión de Shibboleth si existe
        ShibRequestSetting requireSession 1

        # Requiere un usuario autenticado válido
        Require valid-user

        # Solo usuarios con un dominio de correo específico
        # Require shib-attr mail *@tu-universidad.edu

        # Solo miembros de un grupo específico
        # Require shib-attr entitlement urn:mace:example.com:entitlement:admin
    </Location>
</VirtualHost>
